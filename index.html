<!DOCTYPE html>
<html>
<head>
  <title>Skip Counting Adventure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
      overflow-x: hidden;
    }
    h1 { color: #ff6b6b; }

    .top {
      display: flex;
      justify-content: space-around;
      font-size: 18px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px;
    }

    .group {
      background: white;
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    .item { font-size: 24px; }

    button {
      padding: 12px 18px;
      margin: 8px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      transition: transform 0.1s;
    }

    button:active {
      transform: scale(0.9);
    }

    button:hover {
      transform: scale(1.1);
    }

    #msg {
      font-size: 26px;
      margin-top: 10px;
      min-height: 30px;
      transition: all 0.3s;
    }

    /* Confetti */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: fall 2s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
      }
    }
  </style>
</head>
<body>

<h1>🎲 Skip Counting Adventure</h1>

<div class="top">
  ⭐ <span id="score">0</span>
  🎯 Level <span id="level">1</span>
</div>

<h2 id="q"></h2>

<div id="grid" class="grid"></div>
<div id="opts"></div>
<div id="msg"></div>

<!-- Sounds -->
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>

<script>
let score=0, level=1, ans=0;

function play(id){
  document.getElementById(id).currentTime = 0;
  document.getElementById(id).play();
}

function confetti(){
  for(let i=0;i<25;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

function nextQ(){
  let skips = level<3?[2,3]:level<5?[2,3,5]:[2,3,5,10];
  let skip = skips[Math.floor(Math.random()*skips.length)];
  let groups = Math.floor(Math.random()*level)+2;
  ans = skip*groups;

  document.getElementById("q").innerText=`Count by ${skip}`;

  let grid=document.getElementById("grid");
  grid.innerHTML="";

  for(let g=0;g<groups;g++){
    let div=document.createElement("div");
    div.className="group";
    for(let i=0;i<skip;i++){
      div.innerHTML+="🍎";
    }
    grid.appendChild(div);
  }

  let opts=document.getElementById("opts");
  opts.innerHTML="";

  let set=new Set([ans]);
  while(set.size<4){
    let w=ans+(Math.floor(Math.random()*10)-5);
    if(w>0) set.add(w);
  }

  [...set].sort(()=>Math.random()-0.5).forEach(v=>{
    let b=document.createElement("button");
    b.innerText=v;
    b.onclick=()=>{
      play("clickSound");
      check(v);
    };
    opts.appendChild(b);
  });
}

function check(v){
  let msg=document.getElementById("msg");

  if(v===ans){
    score++;
    if(score%5===0) level++;
    msg.innerText="🎉 Great!";
    play("correctSound");
    confetti();
  } else {
    msg.innerText="❌ Try again!";
    play("wrongSound");
  }

  document.getElementById("score").innerText=score;
  document.getElementById("level").innerText=level;

  setTimeout(()=>{
    msg.innerText="";
    nextQ();
  },900);
}

nextQ();
</script>

</body>
</html>
